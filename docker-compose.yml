services:
  postgres:
    image: postgres:16-alpine
    container_name: catalyst-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: catalyst
      POSTGRES_PASSWORD: catalyst
      POSTGRES_DB: catalyst
    ports:
      - '127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - catalyst-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U catalyst -d catalyst']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: catalyst-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:${REDIS_HOST_PORT:-6379}:6379'
    volumes:
      - catalyst-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: catalyst-mailhog
    restart: unless-stopped
    ports:
      - '127.0.0.1:${MAILHOG_SMTP_HOST_PORT:-1025}:1025'
      - '127.0.0.1:${MAILHOG_UI_HOST_PORT:-8025}:8025'

  minio:
    image: minio/minio:latest
    container_name: catalyst-minio
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '127.0.0.1:${MINIO_S3_HOST_PORT:-9000}:9000'
      - '127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9011}:9001'
    volumes:
      - catalyst-minio-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot bucket bootstrap. Exits as soon as buckets exist.
  # Re-run with: docker compose up minio-init
  minio-init:
    image: minio/mc:latest
    container_name: catalyst-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: 'no'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/catalyst-engine-media
        mc mb --ignore-existing local/catalyst-engine-contracts
        mc mb --ignore-existing local/catalyst-engine-exports
        mc mb --ignore-existing local/catalyst-engine-public
        mc anonymous set download local/catalyst-engine-public

volumes:
  catalyst-postgres-data:
    name: catalyst-postgres-data
  catalyst-redis-data:
    name: catalyst-redis-data
  catalyst-minio-data:
    name: catalyst-minio-data
