name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PHP_VERSION: '8.4'

jobs:
  backend:
    name: Backend (Pint + Larastan + Pest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: catalyst
          POSTGRES_PASSWORD: catalyst
          POSTGRES_DB: catalyst_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_pgsql, redis, intl, mbstring, gd, bcmath
          coverage: none
          tools: composer:v2

      - name: Get composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install composer deps
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Pint (lint)
        run: composer pint:test

      - name: Larastan (typecheck, level 8)
        run: composer stan

      - name: Pest (tests)
        run: composer test

  frontend:
    name: Frontend (lint + typecheck + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:frontend

      - name: Typecheck
        run: pnpm typecheck:frontend

      - name: Unit tests
        run: pnpm test:frontend

  # ---------------------------------------------------------------------------
  # E2E — main SPA
  # ---------------------------------------------------------------------------
  #
  # The chunk 6.8 Playwright specs (#19 enrollment + sign-in, #20 lockout
  # + reset) drive the SPA against the real Laravel API. The job:
  #
  #   1. Brings up Postgres + Redis service containers (the Pest job
  #      already proves Laravel boots against these images; we reuse
  #      the same shape so a green pest job means the DB schema is
  #      compatible).
  #   2. Sets up PHP + composer install so the API server is runnable.
  #   3. Generates a fresh `TEST_HELPERS_TOKEN` per run via
  #      `openssl rand -hex 32`. The same value is exported into
  #      `$GITHUB_ENV` so every subsequent step (the API server, the
  #      Playwright runner) sees the same token. Chunk-6.1 review
  #      flagged this as deferred to chunk 6.8.
  #   4. Runs `php artisan key:generate` (the runner has no .env, so
  #      we synthesise APP_KEY) and `migrate:fresh` (idempotent;
  #      Playwright's global setup also calls this, but doing it here
  #      avoids a startup race when `playwright test` boots Laravel
  #      via webServer).
  #   5. Runs Playwright. The config's `webServer` block starts the
  #      API + Vite; both inherit `TEST_HELPERS_TOKEN` from env.
  #
  # The lockout cache MUST honor the simulated test clock for spec
  # #20 AND persist across the per-request PHP processes spawned by
  # `php artisan serve` — see the `CACHE_STORE=database` env var
  # passed to both the API webServer (in `playwright.config.ts`) and
  # this job's env block, and the chunks 6.8-6.9 review's post-merge
  # addendum #3 for the discovery context.
  e2e-main:
    name: E2E — main SPA (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: catalyst
          POSTGRES_PASSWORD: catalyst
          POSTGRES_DB: catalyst
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Laravel runtime configuration. CACHE_STORE=database is the
      # chunk-6.8 hermeticity contract — see playwright.config.ts
      # docblock for the full reasoning (cross-request persistence
      # under `php artisan serve` + `Carbon::setTestNow()` honor).
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: 'http://127.0.0.1:8000'
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_DATABASE: catalyst
      DB_USERNAME: catalyst
      DB_PASSWORD: catalyst
      CACHE_STORE: database
      SESSION_DRIVER: database
      SESSION_COOKIE: catalyst_main_session
      SANCTUM_STATEFUL_DOMAINS: '127.0.0.1:5173,localhost:5173'
      VITE_API_BASE_URL: '/api/v1'
      # No SMTP server is available in the runner (Mailpit ships locally
      # via `make dev` but isn't part of the CI service-container set).
      # `MAIL_MAILER=array` makes `Mail::send()` push to an in-memory
      # collection instead of opening a socket to 127.0.0.1:1025 — so
      # specs that flip the queue to `sync` (e.g. the chunk-3 wizard
      # happy-path) don't trip a 500 when the verification-email job
      # fires inline. Local dev keeps the Mailpit path because `.env`
      # there sets `MAIL_MAILER=smtp` and Mailpit is running.
      MAIL_MAILER: array
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_pgsql, redis, intl, mbstring, gd, bcmath
          coverage: none
          tools: composer:v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Get composer cache dir
        id: composer-cache
        working-directory: apps/api
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install composer deps (apps/api)
        working-directory: apps/api
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install pnpm deps
        run: pnpm install --frozen-lockfile

      - name: Generate fresh TEST_HELPERS_TOKEN per run
        # Per chunk-6.1 review §"Token rotation" + chunk-6.8 review
        # priority #5: the token is generated once and the same
        # value is exported into both API + Playwright runner via
        # $GITHUB_ENV. Never persisted to source control.
        run: echo "TEST_HELPERS_TOKEN=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Generate Laravel APP_KEY
        working-directory: apps/api
        # `key:generate --show` prints just the key; we wrap it in the
        # `APP_KEY=…` form GITHUB_ENV expects so subsequent steps and
        # the Playwright-launched API webServer both see the same key.
        # `APP_KEY=` is set on the command line so artisan's bootstrap
        # does not complain about the missing value while generating.
        run: |
          echo "APP_KEY=$(APP_KEY= php artisan key:generate --show)" >> "$GITHUB_ENV"

      - name: Run database migrations
        working-directory: apps/api
        run: php artisan migrate:fresh --force

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (Chromium)
        run: pnpm --filter @catalyst/main test:e2e:install

      - name: Run Playwright tests
        # `TEST_HELPERS_TOKEN` is on the job env (exported above);
        # Playwright's `playwright.config.ts` reads it both for the
        # `extraHTTPHeaders` block and the API webServer env block.
        run: pnpm --filter @catalyst/main test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-main
          path: apps/main/playwright-report
          retention-days: 14

  # ---------------------------------------------------------------------------
  # E2E — admin SPA (chunk 7.6)
  # ---------------------------------------------------------------------------
  #
  # Mirror of `e2e-main` above with two structurally-correct admin
  # adaptations:
  #
  #   1. Ports are offset to avoid collision when `e2e-main` and
  #      `e2e-admin` run concurrently on the GitHub runner: the
  #      admin Laravel API binds to `:8001` and the admin Vite dev
  #      server to `:5174` (set by `apps/admin/playwright.config.ts`
  #      + `apps/admin/vite.config.ts`). The two jobs run on separate
  #      runners by default, but the service containers in this job
  #      ARE isolated to this runner, so the offset is the safe
  #      shape regardless of GH Actions concurrency policy changes.
  #
  #   2. `SESSION_COOKIE=catalyst_admin_session` (chunks 5 + 7.4 admin
  #      cookie boundary). The path-aware `UseAdminSessionCookie`
  #      middleware swaps this before `StartSession` runs on every
  #      `/api/v1/admin/*` request, so the cookie name has to match
  #      what the admin SPA + the admin auth controllers expect.
  #
  # Closes the chunk-7.4 hotfix tech-debt entry "Admin SPA Playwright
  # job runs without a Laravel backend". The legacy smoke-only spec
  # is replaced by the chunk-7.6 sign-in happy-path + mandatory-MFA
  # enrollment specs (see `apps/admin/playwright/specs/`).
  e2e-admin:
    name: E2E — admin SPA (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: catalyst
          POSTGRES_PASSWORD: catalyst
          POSTGRES_DB: catalyst
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Laravel runtime configuration. Mirrors `e2e-main` with the
      # admin-specific cookie boundary + offset URL.
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: 'http://127.0.0.1:8001'
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_DATABASE: catalyst
      DB_USERNAME: catalyst
      DB_PASSWORD: catalyst
      CACHE_STORE: database
      SESSION_DRIVER: database
      SESSION_COOKIE: catalyst_admin_session
      SANCTUM_STATEFUL_DOMAINS: '127.0.0.1:5174,localhost:5174'
      VITE_API_BASE_URL: '/api/v1'
      # See the e2e-main env block above for the rationale.
      MAIL_MAILER: array
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_pgsql, redis, intl, mbstring, gd, bcmath
          coverage: none
          tools: composer:v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Get composer cache dir
        id: composer-cache
        working-directory: apps/api
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install composer deps (apps/api)
        working-directory: apps/api
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install pnpm deps
        run: pnpm install --frozen-lockfile

      - name: Generate fresh TEST_HELPERS_TOKEN per run
        # Per chunk-6.1 review §"Token rotation" + chunk-6.8 review
        # priority #5: the token is generated once and the same
        # value is exported into both API + Playwright runner via
        # $GITHUB_ENV. Never persisted to source control.
        run: echo "TEST_HELPERS_TOKEN=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Generate Laravel APP_KEY
        working-directory: apps/api
        run: |
          echo "APP_KEY=$(APP_KEY= php artisan key:generate --show)" >> "$GITHUB_ENV"

      - name: Run database migrations
        working-directory: apps/api
        run: php artisan migrate:fresh --force

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (Chromium)
        run: pnpm --filter @catalyst/admin test:e2e:install

      - name: Run Playwright tests
        # `TEST_HELPERS_TOKEN` is on the job env (exported above);
        # Playwright's `playwright.config.ts` reads it both for the
        # `extraHTTPHeaders` block and the API webServer env block.
        # The admin config sets CATALYST_ADMIN_API_PROXY_TARGET so
        # Vite proxies `/api` to the admin-stack port (8001) rather
        # than e2e-main's default (8000).
        run: pnpm --filter @catalyst/admin test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-admin
          path: apps/admin/playwright-report
          retention-days: 14
